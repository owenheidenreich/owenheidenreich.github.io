<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Owen's Web Dev Portfolio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Dark mode toggle -->
  <label class="switch" aria-label="Toggle dark mode">
    <input type="checkbox" id="dark-mode-toggle" />
    <span class="slider"></span>
  </label>

  <header id="header">
    <h1><span>Owen's Web Dev Portfolio</span></h1>

    <!-- Navigation tabs -->
    <nav aria-label="Main navigation">

      <!-- COMMENTED OUT: Blog button
      <a href="blog.html">
        <span class="square-tab">
          Blog
          <img class="tiedye-button" src="assets/img/lava_texture.jpeg" alt="" />
        </span>
      </a>
      END COMMENTED OUT -->

      <!-- Trinity AI: uses tiedye_button animation (same as 2D Triangle Shooter) -->
      <a href="https://dubya.ai" target="_blank" rel="noopener noreferrer">
        <span class="square-tab featured-tab">
          Trinity AI
          <img class="tiedye-button" src="assets/img/tiedye_button.jpeg" alt="" />
        </span>
      </a>

      <!-- Retro Arcade: uses cyan_mosaic animation (same as 3D Maze FPS) -->
      <a href="https://dubya.ai/vidya" target="_blank" rel="noopener noreferrer">
        <span class="square-tab featured-tab">
          Retro Arcade
          <img class="tiedye-button" src="assets/img/cyan_mosaic.jpeg" alt="" />
        </span>
      </a>

      <a href="game-2d.html">
        <span class="square-tab">
          2D Triangle Shooter
          <img class="tiedye-button" src="assets/img/tiedye_button.jpeg" alt="" />
        </span>
      </a>

      <a href="game-3d.html">
        <span class="square-tab">
          3D Maze FPS
          <img class="tiedye-button" src="assets/img/cyan_mosaic.jpeg" alt="" />
        </span>
      </a>

      <a href="stocks.html">
        <span class="square-tab">
          Markets
          <img class="tiedye-button" src="assets/img/lava_texture.jpeg" alt="" />
        </span>
      </a>
    </nav>
  </header>

  <script src="darkmode.js"></script>
</body>
</html>
