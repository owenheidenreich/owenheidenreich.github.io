<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markets – Owen's Web Dev Portfolio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <label class="switch" aria-label="Toggle dark mode">
    <input type="checkbox" id="dark-mode-toggle" />
    <span class="slider"></span>
  </label>

  <a href="index.html">
    <span class="square-tab">
      Home
      <img class="tiedye-button" src="assets/img/tiedye_button.jpeg" alt="" />
    </span>
  </a>

  <main class="container">
    <h2>Live Markets</h2>
    <p>Realtime snapshots from TradingView.</p>

    <!-- TradingView Widget BEGIN -->
    <div class="tradingview-widget-container">
      <div id="tradingview_widget"></div>
    </div>

    <script
      type="text/javascript"
      src="https://s3.tradingview.com/external-embedding/embed-widget-tickers.js"
      async>
    </script>

    <script type="text/javascript">
      document.addEventListener('DOMContentLoaded', function () {
        new TradingView.widget({
          container_id: 'tradingview_widget',
          symbols: [
            { proName: 'FOREXCOM:SPXUSD', title: 'S&P 500' },
            { proName: 'FOREXCOM:NSXUSD', title: 'US 100' },
            { proName: 'FX_IDC:EURUSD', title: 'EUR/USD' },
            { proName: 'BITSTAMP:BTCUSD', title: 'Bitcoin' },
            { proName: 'BITSTAMP:ETHUSD', title: 'Ethereum' },
            { proName: 'NASDAQ:TSLA', title: 'Tesla' }
          ],
          isTransparent: false,
          showSymbolLogo: true,
          colorTheme: 'dark',
          locale: 'en'
        });
      });
    </script>
    <!-- TradingView Widget END -->
  </main>

  <script src="darkmode.js"></script>
</body>
</html>
