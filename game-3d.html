<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>First Person Perspective - 3D Rectangles</title>
  <style>
    body { margin: 0; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    let scene, camera, renderer;
    let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false, jump = false;
    let jumpStartHeight, jumpStartTime;

    function init() {
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 1, 15);

  renderer = new THREE.WebGLRenderer();
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  createStaticRectangles();

  additionalBoxes = []; // Initialize the additionalBoxes array
  createAdditionalBoxes(); // Call the createAdditionalBoxes function

  window.addEventListener('resize', onWindowResize, false);
  window.addEventListener('keydown', onKeyDown, false);
  window.addEventListener('keyup', onKeyUp, false);

  animate();
}

    function isCollidingWithWalls(position) {
  const wallWidth = 1;
  const wallHeight = 5;
  const wallDepth = 25;
  const halfWidth = wallWidth / 2;
  const halfHeight = wallHeight / 2;
  const halfDepth = wallDepth / 2;

  const leftWallPosition = new THREE.Vector3(-6, 2.5, -12.5);
  const rightWallPosition = new THREE.Vector3(6, 2.5, -12.5);

  const wallBox = new THREE.Box3().setFromCenterAndSize(
    new THREE.Vector3(),
    new THREE.Vector3(wallWidth, wallHeight, wallDepth)
  );

  const cameraBox = new THREE.Box3().setFromCenterAndSize(
    position,
    new THREE.Vector3(0.5, 0.5, 0.5)
  );

  const leftWallBox = wallBox.clone().translate(leftWallPosition);
  const rightWallBox = wallBox.clone().translate(rightWallPosition);

  return cameraBox.intersectsBox(leftWallBox) || cameraBox.intersectsBox(rightWallBox);
}

function isCollidingWithMiniWalls(position) {
  const miniWallWidth = 2;
  const miniWallHeight = 1;
  const miniWallDepth = 1;
  const halfWidth = miniWallWidth / 2;
  const halfHeight = miniWallHeight / 2;
  const halfDepth = miniWallDepth / 2;

  const miniWallBox = new THREE.Box3().setFromCenterAndSize(
    new THREE.Vector3(),
    new THREE.Vector3(miniWallWidth, miniWallHeight, miniWallDepth)
  );

  const cameraBox = new THREE.Box3().setFromCenterAndSize(
    position,
    new THREE.Vector3(0.5, 0.5, 0.5)
  );

  return additionalBoxes.some(miniWall => {
    const miniWallBoxClone = miniWallBox.clone().translate(miniWall.position);
    return cameraBox.intersectsBox(miniWallBoxClone);
  });
}

function createAdditionalBoxes() {
  const miniWallGeometry = new THREE.BoxGeometry(2, 1, 1);
  const miniWallMaterial = new THREE.MeshBasicMaterial({ color: 0x0000ff }); // Change mini-wall color to blue
  const outlineMaterial = new THREE.LineBasicMaterial({ color: 0x000000 });

  for (let i = 0; i < 5; i++) { // Reduce the number of mini-walls to slow down their spawn rate
    const miniWall = new THREE.Mesh(miniWallGeometry, miniWallMaterial);
    miniWall.position.set(
      Math.random() * 10 - 5, // Randomize mini-wall starting position between side walls
      0.5,
      -Math.random() * 50 - 10 // Randomize mini-wall starting position in z-axis
    );
    miniWall.speed = 0.1 + Math.random() * 0.2;

    const outlineGeometry = new THREE.EdgesGeometry(miniWallGeometry);
    const outline = new THREE.LineSegments(outlineGeometry, outlineMaterial);
    miniWall.add(outline);

    scene.add(miniWall);
    additionalBoxes.push(miniWall);
  }
}

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function onKeyDown(event) {
      switch (event.code) {
        case 'KeyW': moveForward = true; break;
        case 'KeyA': moveLeft = true; break;
        case 'KeyS': moveBackward = true; break;
        case 'KeyD': moveRight = true; break;
        case 'ArrowUp': if (!jump) { jump = true; jumpStartHeight = camera.position.y; jumpStartTime = performance.now(); } break;
      }
    }

    function onKeyUp(event) {
      switch (event.code) {
        case 'KeyW': moveForward = false; break;
        case 'KeyA': moveLeft = false; break;
        case 'KeyS': moveBackward = false; break;
        case 'KeyD': moveRight = false; break;
      }
    }

    function animate() {
  requestAnimationFrame(animate);

  const moveSpeed = 0.1;
  let newPosition = camera.position.clone();

  if (moveForward) newPosition.z -= moveSpeed;
  if (moveBackward) newPosition.z += moveSpeed;
  if (moveLeft) newPosition.x -= moveSpeed;
  if (moveRight) newPosition.x += moveSpeed;

  if (!isCollidingWithWalls(newPosition) && !isCollidingWithMiniWalls(newPosition) && isInsideBoundaries(newPosition)) {
    camera.position.copy(newPosition);
  }

  additionalBoxes.forEach((miniWall, index) => {
    miniWall.position.z += miniWall.speed;

    if (miniWall.position.z > 10) {
      miniWall.position.set(
        Math.random() * 10 - 5, // Randomize mini-wall starting position between side walls
        0.5,
        -Math.random() * 50 - 10 // Randomize mini-wall starting position in z-axis
      );
      miniWall.speed = 0.1 + Math.random() * 0.2;
    }
  });

  // Jump logic
  if (jump) {
    const currentTime = performance.now();
    const timeDiff = currentTime - jumpStartTime;
    const newY = jumpStartHeight + 2 * Math.sin(0.004 * timeDiff);

    if (timeDiff >= Math.PI / 0.004) {
      jump = false;
      camera.position.y = jumpStartHeight;
    } else {
      camera.position.y = newY;
    }
  }

  renderer.render(scene, camera);
}

    function isInsideBoundaries(position) {
  const xMin = -25;
  const xMax = 25;
  const zMin = -25;
  const zMax = 25;

  return (
    position.x > xMin &&
    position.x < xMax &&
    position.z > zMin &&
    position.z < zMax
  );
}

function createStaticRectangles() {
  const boxGeometry = new THREE.BoxGeometry(1, 5, 25);
  const floorGeometry = new THREE.BoxGeometry(100, 1, 25); // Create floor geometry
  const boxMaterial = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
  const floorMaterial = new THREE.MeshBasicMaterial({ color: 0xff0000 }); // Create floor material

  const leftWall = new THREE.Mesh(boxGeometry, boxMaterial);
  const rightWall = new THREE.Mesh(boxGeometry, boxMaterial);
  const floor = new THREE.Mesh(floorGeometry, floorMaterial); // Create floor mesh

  leftWall.position.set(-6, 2.5, -12.5);
  rightWall.position.set(6, 2.5, -12.5);
  floor.position.set(0, 0, -12.5); // Set floor position

  scene.add(leftWall);
  scene.add(rightWall);
  scene.add(floor); // Add floor to the scene
}

init();
</script>
</body>
</html>
